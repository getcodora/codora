######## PACKAGE - SETUP ########
[package]
name = "codora"
version = { workspace = true }
edition = { workspace = true }

[lib]
path = "crates/codora/src/lib.rs"

[[bin]]
name = "codora"
path = "crates/codora/src/main.rs"

[features]
default = []
validator = ["dep:codora-validator"]
security = ["dep:codora-security"]
util = ["dep:codora-util"]
axum = ["dep:codora-axum"]


[dependencies]
codora-axum = { workspace = true, optional = true }
codora-util = { workspace = true, optional = true }
codora-security = { workspace = true, optional = true }
codora-validator = { workspace = true, optional = true }


######## WORKSPACE - SETUP ########
[workspace]
members = [
    ".",
    "crates/codora-security",
    "crates/codora-util",
    "crates/codora-axum",
    "crates/codora-validator",
]
resolver = "2"


[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/getcodora/codora"
keywords = [
    "web",
    "server",
    "ui",
    "web framework",
    "orm",
    "authentication",
    "server function",
    "server action",
    "security",
    "logging",
]
categories = ["web-programming", "web-framework", "orm"]
authors = ["West Sheriff <west.sh.mail@gmail.com>"]

[workspace.dependencies]
# Workspace Crates
codora = { path = "." }
codora-security = { path = "./crates/codora-security" }
codora-validator = { path = "./crates/codora-validator" }
codora-util = { path = "./crates/codora-util" }
codora-axum = { path = "./crates/codora-axum" }


# External Crates
anyhow = "1.0.87"
serde = "1.0.215"
tokio = { version = "1.44.0" }
axum = "0.8.1"

[workspace.lints.clippy]

